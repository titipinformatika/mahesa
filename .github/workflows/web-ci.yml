name: Web CI

on:
  push:
    branches: [main, develop]
    paths: ['web/**']
  pull_request:
    branches: [main]
    paths: ['web/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./web
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: ./web
        run: bunx tsc --noEmit

      - name: Lint
        working-directory: ./web
        run: bun run lint

      - name: Build
        working-directory: ./web
        run: bun run build
